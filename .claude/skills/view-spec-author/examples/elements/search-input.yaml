entity: element
id: ELM-search-input
name: "Search Input"
docs: ./search-input.md
tests: ./search-input.feature

type: input

states:
  default:
    border: "1px solid #DADCE0"
    border-radius: 24
    padding: "12px 16px"
    font-size: 16
    width: "100%"
  hover:
    border-color: "#B0B3B8"
  focused:
    border-color: "#1A73E8"
    box-shadow: "0 0 0 2px rgba(26,115,232,0.2)"
  disabled:
    background: "#F1F3F4"
    color: "#80868B"
    cursor: not-allowed
  error:
    border-color: "#D93025"
    box-shadow: "0 0 0 2px rgba(217,48,37,0.2)"
  loading:
    background: "#F8F9FA"
    cursor: wait

actions:
  - trigger: submit
    action: { $ref: ACT-submit-search }
  - trigger: change
    action: { $ref: ACT-submit-search }

store-binding:
  store: { $ref: STR-search-store }
  field: query

validation:
  - rule: max-length
    value: 256
    message: "Search query must be 256 characters or less"

accessibility:
  role: searchbox
  label: "Search input"
  keyboard:
    - key: Enter
      action: { $ref: ACT-submit-search }
    - key: Escape
      action: { $ref: ACT-navigate }
