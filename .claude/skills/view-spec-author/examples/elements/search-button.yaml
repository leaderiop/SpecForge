entity: element
id: ELM-search-button
name: "Search Button"
docs: ./search-button.md
tests: ./search-button.feature

type: button

states:
  default:
    background: "#1A73E8"
    color: "#FFFFFF"
    border: none
    border-radius: 24
    padding: "12px 24px"
    font-size: 14
    font-weight: 600
    cursor: pointer
  hover:
    background: "#1557B0"
  active:
    background: "#174EA6"
  disabled:
    background: "#DADCE0"
    color: "#80868B"
    cursor: not-allowed
  loading:
    background: "#1A73E8"
    opacity: 0.7
    cursor: wait

actions:
  - trigger: click
    action: { $ref: ACT-submit-search }

store-binding:
  store: { $ref: STR-search-store }
  field: isLoading

accessibility:
  role: button
  label: "Submit search"
  keyboard:
    - key: Enter
      action: { $ref: ACT-submit-search }
    - key: Space
      action: { $ref: ACT-submit-search }
