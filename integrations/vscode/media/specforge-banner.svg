<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34A853" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#34A853" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bannerBg)"/>

  <!-- Subtle center glow -->
  <ellipse cx="640" cy="320" rx="500" ry="300" fill="url(#centerGlow)"/>

  <!-- ===== Background decorative graph (left cluster) ===== -->
  <g opacity="0.12">
    <!-- Edges -->
    <line x1="120" y1="180" x2="200" y2="140" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="120" y1="180" x2="80" y2="260" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="120" y1="180" x2="200" y2="240" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="200" y1="140" x2="280" y2="180" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="200" y1="240" x2="280" y2="180" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="80" y1="260" x2="160" y2="320" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="200" y1="240" x2="160" y2="320" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="280" y1="180" x2="340" y2="240" stroke="#34A853" stroke-width="1.5"/>
    <line x1="160" y1="320" x2="240" y2="360" stroke="#34A853" stroke-width="1.5"/>
    <!-- Nodes -->
    <circle cx="120" cy="180" r="8" fill="#4285F4"/>
    <circle cx="200" cy="140" r="6" fill="#34A853"/>
    <circle cx="80" cy="260" r="5" fill="#4285F4"/>
    <circle cx="200" cy="240" r="7" fill="#4285F4"/>
    <circle cx="280" cy="180" r="6" fill="#34A853"/>
    <circle cx="160" cy="320" r="5" fill="#4285F4"/>
    <circle cx="340" cy="240" r="4" fill="#34A853"/>
    <circle cx="240" cy="360" r="4" fill="#4285F4"/>
  </g>

  <!-- ===== Background decorative graph (right cluster) ===== -->
  <g opacity="0.12">
    <!-- Edges -->
    <line x1="1000" y1="200" x2="1080" y2="160" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="1000" y1="200" x2="1100" y2="260" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="1000" y1="200" x2="940" y2="280" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="1080" y1="160" x2="1160" y2="200" stroke="#34A853" stroke-width="1.5"/>
    <line x1="1100" y1="260" x2="1160" y2="200" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="940" y1="280" x2="1020" y2="340" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="1100" y1="260" x2="1020" y2="340" stroke="#34A853" stroke-width="1.5"/>
    <line x1="1160" y1="200" x2="1200" y2="140" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="1020" y1="340" x2="1100" y2="380" stroke="#4285F4" stroke-width="1.5"/>
    <!-- Nodes -->
    <circle cx="1000" cy="200" r="8" fill="#4285F4"/>
    <circle cx="1080" cy="160" r="6" fill="#34A853"/>
    <circle cx="1100" cy="260" r="7" fill="#4285F4"/>
    <circle cx="940" cy="280" r="5" fill="#34A853"/>
    <circle cx="1160" cy="200" r="6" fill="#4285F4"/>
    <circle cx="1020" cy="340" r="5" fill="#34A853"/>
    <circle cx="1200" cy="140" r="4" fill="#4285F4"/>
    <circle cx="1100" cy="380" r="4" fill="#4285F4"/>
  </g>

  <!-- ===== Background decorative graph (bottom-left) ===== -->
  <g opacity="0.08">
    <line x1="300" y1="440" x2="380" y2="480" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="380" y1="480" x2="340" y2="540" stroke="#34A853" stroke-width="1.5"/>
    <line x1="300" y1="440" x2="340" y2="540" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="380" y1="480" x2="460" y2="460" stroke="#4285F4" stroke-width="1.5"/>
    <circle cx="300" cy="440" r="5" fill="#4285F4"/>
    <circle cx="380" cy="480" r="6" fill="#34A853"/>
    <circle cx="340" cy="540" r="4" fill="#4285F4"/>
    <circle cx="460" cy="460" r="4" fill="#34A853"/>
  </g>

  <!-- ===== Background decorative graph (bottom-right) ===== -->
  <g opacity="0.08">
    <line x1="860" y1="460" x2="920" y2="500" stroke="#34A853" stroke-width="1.5"/>
    <line x1="920" y1="500" x2="980" y2="460" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="860" y1="460" x2="980" y2="460" stroke="#4285F4" stroke-width="1.5"/>
    <line x1="920" y1="500" x2="900" y2="560" stroke="#34A853" stroke-width="1.5"/>
    <circle cx="860" cy="460" r="5" fill="#34A853"/>
    <circle cx="920" cy="500" r="6" fill="#4285F4"/>
    <circle cx="980" cy="460" r="4" fill="#34A853"/>
    <circle cx="900" cy="560" r="4" fill="#4285F4"/>
  </g>

  <!-- ===== Scattered floating dots for atmosphere ===== -->
  <g opacity="0.15">
    <circle cx="50" cy="100" r="2" fill="white"/>
    <circle cx="180" cy="60" r="1.5" fill="white"/>
    <circle cx="420" cy="120" r="2" fill="white"/>
    <circle cx="560" cy="80" r="1.5" fill="white"/>
    <circle cx="740" cy="100" r="2" fill="white"/>
    <circle cx="900" cy="70" r="1.5" fill="white"/>
    <circle cx="1100" cy="90" r="2" fill="white"/>
    <circle cx="1230" cy="300" r="1.5" fill="white"/>
    <circle cx="50" cy="400" r="2" fill="white"/>
    <circle cx="1240" cy="520" r="1.5" fill="white"/>
    <circle cx="640" cy="580" r="2" fill="white"/>
    <circle cx="400" cy="590" r="1.5" fill="white"/>
    <circle cx="880" cy="570" r="1.5" fill="white"/>
  </g>

  <!-- ===== Central text ===== -->

  <!-- "SpecForge" title -->
  <text x="640" y="290" text-anchor="middle" fill="white" font-family="'Segoe UI', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-size="72" font-weight="700" letter-spacing="2">SpecForge</text>

  <!-- Subtle line separator -->
  <line x1="540" y1="312" x2="740" y2="312" stroke="rgba(66,133,244,0.4)" stroke-width="2" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="640" y="355" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-size="28" font-weight="300" letter-spacing="1">Structured Specs for AI Agents</text>

  <!-- Subtle small graph icon centered below tagline -->
  <g transform="translate(640, 420)" opacity="0.25">
    <line x1="-20" y1="0" x2="0" y2="-16" stroke="white" stroke-width="1.5"/>
    <line x1="20" y1="0" x2="0" y2="-16" stroke="white" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="-16" r="4" fill="#4285F4"/>
    <circle cx="-20" cy="0" r="4" fill="#34A853"/>
    <circle cx="20" cy="0" r="4" fill="#4285F4"/>
  </g>
</svg>
