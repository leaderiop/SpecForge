<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.25)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- Edges (connections between nodes) -->
  <!-- Central hub to outer nodes -->
  <line x1="64" y1="58" x2="38" y2="32" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="58" x2="92" y2="32" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="58" x2="32" y2="72" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="58" x2="96" y2="72" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="58" x2="48" y2="98" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="58" x2="80" y2="98" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Cross-connections (peer edges for graph feel) -->
  <line x1="38" y1="32" x2="92" y2="32" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="72" x2="48" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="72" x2="80" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="32" x2="32" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="92" y1="32" x2="96" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Central node (primary, largest) -->
  <circle cx="64" cy="58" r="10" fill="#4285F4"/>
  <circle cx="64" cy="58" r="6" fill="#5E97F6" opacity="0.6"/>

  <!-- Top-left node -->
  <rect x="30" y="24" width="16" height="16" rx="3" fill="#34A853"/>

  <!-- Top-right node -->
  <rect x="84" y="24" width="16" height="16" rx="3" fill="#4285F4"/>

  <!-- Mid-left node -->
  <circle cx="32" cy="72" r="7" fill="#34A853" opacity="0.85"/>

  <!-- Mid-right node -->
  <circle cx="96" cy="72" r="7" fill="#4285F4" opacity="0.85"/>

  <!-- Bottom-left node -->
  <rect x="41" y="91" width="14" height="14" rx="3" fill="#34A853" opacity="0.7"/>

  <!-- Bottom-right node -->
  <rect x="73" y="91" width="14" height="14" rx="3" fill="#4285F4" opacity="0.7"/>

  <!-- Small dot accents (tiny satellite nodes for depth) -->
  <circle cx="20" cy="50" r="3" fill="white" opacity="0.3"/>
  <circle cx="108" cy="50" r="3" fill="white" opacity="0.3"/>
  <circle cx="64" cy="112" r="3" fill="white" opacity="0.3"/>
</svg>
